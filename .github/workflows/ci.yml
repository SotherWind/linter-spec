name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # ESLint config + markdownlint config are imported from their built dist.
      - run: pnpm -r build

      - run: pnpm lint

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # Engine floor is ^20.19.0 || >=22.12.0 (see Phase 5.5 in PROGRESS.md);
        # 18 is intentionally excluded — it's EOL and require(esm) is unstable there.
        node: ['20.19', '22', '24']
        # The CLI shells out via cross-spawn and the author develops on Windows;
        # cover Windows/macOS on one Node version (no need for the full N×M grid).
        include:
          - os: windows-latest
            node: '22'
          - os: macos-latest
            node: '22'
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - run: pnpm -r test
