<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="linter-spec">
  <title>linter-spec</title>
  <defs>
    <linearGradient id="ls-badge-d" x1="18" y1="12" x2="110" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4AABFF" />
      <stop offset="1" stop-color="#1380FF" />
    </linearGradient>
    <linearGradient id="ls-gloss-d" x1="64" y1="6" x2="64" y2="74" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".34" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- rounded-square badge with a faint rim light so it separates from a dark nav -->
  <rect x="6" y="6" width="116" height="116" rx="28" fill="url(#ls-badge-d)"
        stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.5" />
  <rect x="6" y="6" width="116" height="116" rx="28" fill="url(#ls-gloss-d)" />

  <!-- isometric cube (package mark) -->
  <g transform="translate(22 20) scale(0.84)">
    <path d="M50 15 85 35 50 55 15 35Z" fill="#ffffff" />
    <path d="M15 35 50 55 50 90 15 70Z" fill="#D2E6FF" />
    <path d="M85 35 50 55 50 90 85 70Z" fill="#A9CCF5" />
  </g>
</svg>
